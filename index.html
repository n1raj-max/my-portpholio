   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorite Apps</title>
    <style>
        /* Website ka design aur colors */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            text-align: center;
            padding-top: 100px;
        }
        h1 {
            color: #333333;
        }
        p {
            color: #666666;
            margin-bottom: 40px;
        }
        /* Buttons ka design */
        .app-container {
            display: flex;
            justify-content: center;
            gap: 20px; /* Buttons ke beech ki jagah */
        }
        .app-btn {
            text-decoration: none;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s; /* Hover karne par effect */
        }
        .app-btn:hover {
            transform: scale(1.05); /* Button thoda bada hoga */
        }
        /* Specific app colors */
        .youtube { background-color: #FF0000; }
        .chrome { background-color: #4285F4; }
    </style>
</head>
<body>

    <h1>Welcome to My App Hub</h1>
    <p>Apne favorite apps open karne ke liye niche click karein:</p>

    <div class="app-container">
        <a href="https://www.youtube.com" target="_blank" class="app-btn youtube">YouTube</a>
        
        <a href="https://www.google.com" target="_blank" class="app-btn chrome">Google Chrome</a>
    </div>

</body>
</html> 
    
</body>
</html>
